name: Update Auction Data

on:
  schedule:
    # 週一至週五 (交易日) 交易時段多跑幾次，以保持興櫃價新鮮
    # Taiwan 09:30 = UTC 01:30 (興櫃開盤後)
    - cron: '30 1 * * 1-5'
    # Taiwan 13:00 = UTC 05:00 (午盤)
    - cron: '0 5 * * 1-5'
    # Taiwan 15:30 = UTC 07:30 (興櫃收盤後)
    - cron: '30 7 * * 1-5'
    # 每天 18:00 Taiwan = UTC 10:00 (全面更新，含週末補資料)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch auction data
        run: python fetch_auction_monitor.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _monitor_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update auction data $(date -u '+%Y-%m-%d %H:%M')"
          # Retry push with rebase in case remote advanced (local commits / other runs)
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push && break
            echo "push attempt $i failed, retry..."
            sleep 5
          done
